# ── Shared ────────────────────────────────────────────────────────────────────
# Only months on or before this date are used by create_provider_level_from_month.py.
date_cutoff: "2024-12-31"

# ── Provider-level feature settings ───────────────────────────────────────────
provider_level_features:

  # Providers with fewer observed months than this receive insufficient_history_flag=1.
  # Raise this to require more history before including a provider in the output.
  min_months_observed: 6

  # Avoid division by 0 when comoputing percent growth
  pct_growth_prior_floor: 10.0

  # Rolling robust-z anomaly flag settings.
  # window_obs: prior observed rows used as the rolling baseline (not calendar months).
  # robust_z_threshold: |z| above this flags the month as anomalous.
  # last_k_observed: the "recent activity" lookback for x_num_flagged_last_k_obs.
  # Lower robust_z_threshold or smaller window_obs → more months flagged.
  rolling_flags:
    window_obs: 3
    robust_z_threshold: 2.5
    last_k_observed: 6

  # PELT changepoint detection.
  # Higher penalty → fewer breakpoints; lower penalty → more sensitivity.
  # Raise min_obs if sparse providers cause ruptures errors.
  changepoints:
    penalty: 2.0
    model: "rbf"
    min_size: 3
    min_obs: 6
